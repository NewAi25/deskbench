# DeskBench model registry — THE env-var insight, materialized.
#
# Every model is a config entry, never code. Adding a model is a one-line change
# here plus an env var in .env (see docs/adding-a-model.md). Keys are read from
# the environment by name only; no secret ever lives in this file.
#
# `sampling.source: vendor-default` means DeskBench sends NO temperature/top_p/
# max_tokens and lets the provider apply its own defaults. This is the v1
# policy (ARCHITECTURE_REVIEW fix #3): "variance under vendor-default settings"
# is the deployment-realistic claim an office user actually experiences. To pin
# a value instead, set source: explicit and fill the field(s).
#
# Model strings below are best-effort free-tier slugs. Run `deskbench ping`
# against your own .env to confirm each provider answers; any that has been
# renamed by its provider is a one-line fix here.

# ---------------------------------------------------------------------------
# Leaderboard models — four labs, $0. The judge (below) is held out of this
# list for judge independence (ARCHITECTURE_REVIEW fix #1).
# ---------------------------------------------------------------------------
models:
  - id: gemini-flash
    provider: google-ai-studio
    litellm_model: gemini/gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
    sampling:
      source: vendor-default

  - id: glm-4.7-flash
    provider: zai
    litellm_model: openai/glm-4.7-flash
    api_key_env: ZAI_API_KEY
    # Z.ai is OpenAI-compatible; litellm needs its base URL explicitly.
    base_url: https://api.z.ai/api/paas/v4
    sampling:
      source: vendor-default

  - id: llama-3.3-70b
    provider: groq
    litellm_model: groq/llama-3.3-70b-versatile
    api_key_env: GROQ_API_KEY
    sampling:
      source: vendor-default

  - id: gpt-oss-20b-free
    provider: openrouter
    # DeepSeek no longer has a :free OpenRouter variant (all went paid), so this
    # leaderboard slot now hosts OpenAI's open-weight gpt-oss-20b. Family change
    # (DeepSeek -> OpenAI) logged in BUILD_LOG. The id was renamed from
    # deepseek-v3-free to match what it serves (ids appear in result filenames,
    # the dashboard, and the report, so they must be honest).
    litellm_model: openrouter/openai/gpt-oss-20b:free
    api_key_env: OPENROUTER_API_KEY
    sampling:
      source: vendor-default

# ---------------------------------------------------------------------------
# Judge — held out of the leaderboard (never grades its own family).
# NVIDIA Nemotron is independent of all four leaderboard families
# (Google / Zhipu / Meta / OpenAI), so it cannot self-prefer any of them.
# Every Qwen :free tier (2.5-72B, qwen3-next, qwen3-coder) is now paid or
# persistently upstream-rate-limited on OpenRouter, so the judge moved from the
# Qwen family to NVIDIA Nemotron-3-Ultra-550B :free — the strongest free,
# family-independent, reliably-answering option (verified 3/3 by ping). The id
# was renamed from qwen-2.5-72b-judge to nemotron-judge to match what it serves;
# see BUILD_LOG for the slug history and the self-preference fallback if free
# tiers ever force overlap.
# ---------------------------------------------------------------------------
judge:
  id: nemotron-judge
  provider: openrouter
  litellm_model: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
  api_key_env: OPENROUTER_API_KEY
  sampling:
    source: vendor-default
