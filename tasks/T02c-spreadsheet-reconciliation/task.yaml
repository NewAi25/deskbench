id: T02c-spreadsheet-reconciliation
title: "Reconcile a CRM export against the finance ledger (clean twin)"
category: data-wrangling
difficulty: medium
variant: clean
twin_of: T02-spreadsheet-reconciliation
prompt: |
  Two systems exported what should be the same set of Q1 deals: the sales team's
  CRM (crm_export.csv) and the finance ledger (finance_ledger.csv). The two
  totals don't match, and someone needs to figure out why before quarter close.

  Produce:

  1. The correct reconciled total for these deals, with your reasoning.
  2. A line-by-line reconciliation: for every difference between the two files,
     say what it is and classify it as either a COSMETIC/formatting artifact
     (same underlying deal, just written differently) or a GENUINE data error
     (the numbers actually disagree).
  3. A clear call on which single difference is the real data error that needs
     correcting, versus which differences are only cosmetic.

  State any assumptions explicitly (for example, if a date or which system to
  trust is ambiguous). Do not fabricate any figure, row, or customer that is not
  in the two files. If you cannot determine a value for certain, say so rather
  than inventing one.
artifacts:
  - crm_export.csv
  - finance_ledger.csv
tools_allowed: []
author_notes: >
  Clean twin of T02 (CORE stays, NOISE goes). All THREE genuine problems are
  kept, with values byte-for-byte identical to the messy twin: (a) Bluecrest row
  1012 (8,400) is duplicated in finance, re-listed lower after Tidewater 1021
  (+8,400); (b) Everest 1019 is 1,500 in finance vs 15,000 in the CRM (dropped
  zero, −13,500); and (c) Halcyon 1008 closes 2024-03-05 in the CRM vs
  2024-02-05 in finance (wrong month, same 11,200 amount, 0 total effect) — so
  CRM totals 375,740 and finance totals 370,640, net −5,100, exactly as in the
  messy twin. Removed: every cosmetic difference — customer names and transaction
  ids are identical in both files, dates are ISO in both files, and amounts use
  one plain format. The prompt is byte-identical to T02: it still asks for a
  cosmetic-vs-genuine classification, and the honest answer is that no cosmetic
  differences exist (only the three genuine ones) — a model that manufactures
  cosmetic findings in clean data fails the same discipline the messy twin tests.
