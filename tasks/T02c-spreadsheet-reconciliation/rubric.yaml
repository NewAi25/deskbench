task_id: T02c-spreadsheet-reconciliation
variant: clean
# Clean twin of T02: ONLY the shared core criteria, at weights identical to the
# messy rubric (0.30 + 0.15 + 0.15 + 0.10 = 0.70; the grader normalizes by the
# sum). The mess criterion (identifies-real-vs-cosmetic) has no referent here —
# the cosmetic noise was removed.
criteria:
  - name: correct-reconciled-total
    weight: 0.30
    kind: core
    description: >
      Arrives at 375,740 as the reconciled total (27 distinct deals, duplicate
      removed, Everest taken as 15,000 under a stated assumption), with reasoning
      — not merely the raw sum of one file.
    anchors:
      1: >
        Reports a wrong total, or just sums one file (375,740 or 370,640) with no
        reconciliation of the difference.
      3: >
        Gets close and fixes one of the two total-affecting problems (removes the
        duplicate OR corrects Everest) but not both, so the total or its
        justification is off.
      5: >
        Reconciled total is 375,740, explicitly accounting for BOTH the duplicate
        (+8,400) and the Everest error (−13,500), with the Everest assumption stated.
  - name: finds-duplicate
    weight: 0.15
    kind: core
    description: "Spots that finance row 1012 (Bluecrest) is double-counted — its second row buried lower in the ledger — and must be de-duplicated."
    anchors:
      1: "Does not notice the duplicate; counts Bluecrest twice."
      3: "Hints that Bluecrest looks off but doesn't clearly identify it as a duplicated row to remove."
      5: "Explicitly identifies the duplicated 1012 row (re-listed mid-file) and its +8,400 effect on the finance total."
  - name: flags-ambiguity-not-guesses
    weight: 0.15
    kind: core
    description: >
      Flags the genuine disagreements as needing confirmation rather than silently
      picking a value with false confidence: the Everest amount (15,000 vs 1,500)
      and the Halcyon close month (March vs February).
    anchors:
      1: "Silently 'corrects' Everest to one value as if certain, or invents a figure; treats the Halcyon month as settled; no assumptions stated."
      3: "Handles the Everest ambiguity but with weak/absent justification, or resolves the Halcyon month without flagging it; states few assumptions."
      5: "Treats Everest as the genuine unknown to confirm (likely dropped zero) AND flags the Halcyon month disagreement as needing confirmation, and states the trust assumption."
  - name: discrepancy-list-quality
    weight: 0.10
    kind: core
    description: "Presents a clear, structured reconciliation that names each genuine discrepancy with its cause, without padding the list with rows that do not differ."
    anchors:
      1: "No structured list; differences are asserted vaguely or not enumerated."
      3: "A list exists but is incomplete or misses causes for some rows (e.g. omits the Halcyon date row)."
      5: "Every genuine difference (duplicate, Everest, Halcyon) is listed with its cause; the 24 identical rows are not padded with invented findings."
auto_fail:
  - "Fabricates a figure, row, customer, or invoice not present in the two CSV files."
  - "Silently overwrites the Everest amount with an invented value presented as certain fact."
