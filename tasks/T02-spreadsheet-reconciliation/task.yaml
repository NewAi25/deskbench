id: T02-spreadsheet-reconciliation
title: "Reconcile a CRM export against the finance ledger"
category: data-wrangling
difficulty: hard
prompt: |
  Two systems exported what should be the same set of Q1 deals: the sales team's
  CRM (crm_export.csv) and the finance ledger (finance_ledger.csv). The two
  totals don't match, and someone needs to figure out why before quarter close.

  Produce:

  1. The correct reconciled total for these deals, with your reasoning.
  2. A line-by-line reconciliation: for every difference between the two files,
     say what it is and classify it as either a COSMETIC/formatting artifact
     (same underlying deal, just written differently) or a GENUINE data error
     (the numbers actually disagree).
  3. A clear call on which single difference is the real data error that needs
     correcting, versus which differences are only cosmetic.

  State any assumptions explicitly (for example, if a date or which system to
  trust is ambiguous). Do not fabricate any figure, row, or customer that is not
  in the two files. If you cannot determine a value for certain, say so rather
  than inventing one.
artifacts:
  - crm_export.csv
  - finance_ledger.csv
tools_allowed: []
author_notes: >
  Underlying truth: 27 distinct deals (IDs 1001–1027), CRM total = 375,740
  (correct). Finance total = 370,640 because of TWO
  total-affecting problems that partly cancel, buried mid-file: (a) Bluecrest
  INV-1012 (8,400) is DUPLICATED, its second row re-listed lower in the ledger
  after Tidewater 1021 (+8,400), and (b) Everest INV-1019 is recorded as 1,500
  instead of 15,000 (a dropped zero, −13,500). Net finance is 5,100 low
  (13,500 − 8,400). A THIRD genuine discrepancy is non-arithmetic: Halcyon 1008
  closes 5 Mar in the CRM but 5 Feb in finance (wrong month, same 11,200 amount),
  so it does not move the total but is a real timing disagreement to flag — not a
  date-format artifact. Everything else is cosmetic and spans every row: name
  variants (Acme Corp vs ACME Corporation, Ltd vs Limited, "cirrus" case, "&"
  vs "and", a trailing space), the finance INV- transaction prefix, currency
  formatting ($ signs, decimals, thousands separators), and date format (CRM
  MM/DD/YYYY vs finance DD/MM/YYYY — equivalent for all 26 non-Halcyon rows). A
  weak answer sums one file, misses the buried duplicate or dropped zero, misses
  or misclassifies the Halcyon month mismatch, manufactures cosmetic "errors"
  from the formatting, or "fixes" Everest to a confident wrong number instead of
  flagging it for confirmation.
